name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install core + dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Core deps needed to import and test without the heavy GUI/audio stack.
          pip install "pydantic>=2.6,<3" "pydantic-settings>=2.2,<3" python-dotenv psutil pytest ruff
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
